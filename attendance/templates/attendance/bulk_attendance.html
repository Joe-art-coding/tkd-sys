{% extends "admin/base_site.html" %}
{% block content %}
<div style="padding:20px">
    <a href="{% url 'attendance_school_list' %}">← Back</a>
    <h2>{{ school.name }}</h2>
    
    <form method="POST">
        {% csrf_token %}
        Date: <input type="date" name="date" required><br><br>
        
        <table style="width:100%">
            <tr><th>Present</th><th>Name</th><th>Belt</th></tr>
            {% for student in students %}
            <tr>
                <td><input type="checkbox" name="present_{{ student.id }}"></td>
                <td>{{ student.name }}</td>
                <td>{{ student.get_belt_rank_display }}</td>
            </tr>
            {% endfor %}
        </table>
        
        <button type="submit">Save</button>
    </form>
</div>
{% endblock %}
