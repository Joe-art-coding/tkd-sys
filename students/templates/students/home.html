<!DOCTYPE html>
<html>
<head>
    <title>Taiping Taekwondo Club</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 50%, #0284c7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            color: white;
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            padding: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 18px;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 30px;
            background: white;
            color: #1e293b;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }
        
        .btn-outline:hover {
            background: white;
            color: #1e293b;
            transform: translateY(-2px);
        }
        
        .footer {
            margin-top: 50px;
            opacity: 0.7;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            {% load static %}
            <img src="{% static 'images/logo.png' %}" alt="Taiping Taekwondo Club">
        </div>
        <h1>Taiping Taekwondo Club</h1>
        <div class="subtitle">Management System</div>
        
        <div class="buttons">
            <a href="/admin/" class="btn btn-primary">Admin Login</a>
            <a href="/parent/" class="btn btn-outline">Parent Portal</a>
        </div>
        
        <div class="footer">
            © 2025 Taiping Taekwondo Club | All Rights Reserved
        </div>
    </div>
</body>
</html>
