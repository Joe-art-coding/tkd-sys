{% extends "admin/base_site.html" %}
{% load static %}

{% block extrastyle %}
<style>
    .edit-container {
        max-width: 600px;
        margin: 50px auto;
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    
    h1 {
        margin-bottom: 25px;
        color: #333;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
    }
    
    .form-group input, .form-group select {
        width: 100%;
        padding: 10px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #667eea;
    }
    
    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .checkbox-group input {
        width: auto;
    }
    
    .form-buttons {
        display: flex;
        gap: 15px;
        margin-top: 25px;
    }
    
    .btn-save {
        background: #10b981;
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
    }
    
    .btn-cancel {
        background: #6c757d;
        color: white;
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
        text-align: center;
    }
    
    .btn-save:hover {
        background: #059669;
    }
    
    .btn-cancel:hover {
        background: #5a6268;
    }
    
    .help-text {
        font-size: 12px;
        color: #888;
        margin-top: 5px;
    }
</style>
{% endblock %}

{% block content %}
<div class="edit-container">
    <h1>Edit Contact</h1>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Select from existing user (optional)</label>
            <select name="user_id" id="user_select" onchange="fillUserDetails()">
                <option value="">-- Manual Entry --</option>
                {% for user in club_users %}
                <option value="{{ user.id }}" 
                        data-name="{{ user.get_full_name|default:user.username }}"
                        data-role="{{ user.profile.get_role_display }}"
                        data-phone="{{ user.profile.phone|default:'' }}"
                        data-email="{{ user.email }}">
                    {{ user.get_full_name|default:user.username }} - {{ user.profile.get_role_display }}
                </option>
                {% endfor %}
            </select>
            <div class="help-text">Select a user to auto-fill their information</div>
        </div>
        
        <div class="form-group">
            <label>Name *</label>
            <input type="text" name="name" id="contact_name" value="{{ contact.name }}" required>
        </div>
        
        <div class="form-group">
            <label>Role *</label>
            <input type="text" name="role" id="contact_role" value="{{ contact.role }}" required>
        </div>
        
        <div class="form-group">
            <label>Phone *</label>
            <input type="text" name="phone" id="contact_phone" value="{{ contact.phone }}" required>
        </div>
        
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" id="contact_email" value="{{ contact.email|default:'' }}">
        </div>
        
        <div class="form-group checkbox-group">
            <input type="checkbox" name="is_emergency" id="is_emergency" {% if contact.is_emergency %}checked{% endif %}>
            <label for="is_emergency">Emergency Contact</label>
        </div>
        
        <div class="form-buttons">
            <button type="submit" class="btn-save">Save Changes</button>
            <a href="{% url 'manage_contacts' %}" class="btn-cancel">Cancel</a>
        </div>
    </form>
</div>

<script>
    function fillUserDetails() {
        var select = document.getElementById('user_select');
        var selectedOption = select.options[select.selectedIndex];
        
        if (selectedOption.value) {
            document.getElementById('contact_name').value = selectedOption.getAttribute('data-name') || '';
            document.getElementById('contact_role').value = selectedOption.getAttribute('data-role') || '';
            document.getElementById('contact_phone').value = selectedOption.getAttribute('data-phone') || '';
            document.getElementById('contact_email').value = selectedOption.getAttribute('data-email') || '';
        }
    }
</script>
{% endblock %}
